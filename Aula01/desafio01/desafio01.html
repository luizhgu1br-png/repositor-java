    <h1>DESAFIO 1</h1>
    <hr>
    <script>
    window.alert("Desafio 1");
    let num = window.prompt("qual é o número");
    let num2 = window.prompt("qual o número 2?");
    num = parseFloat(num)
    num2 = parseFloat(num2)
    let resultado = 0
    let operação = window.prompt("qual é a operação que quer fazer? + para adição e - para subtração")
    if (operação=="+"){
        resultado = num + num2
    }
    else{
        resultado = num - num2
    }
    alert(resultado)
    </script>
